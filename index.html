<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokemon Connections</title>
  </head>
  <body>
    <div id="app">
      <header>
        <h1>Pokemon Connections</h1>
        <p id="victory">Create four groups of four!</p>
      </header>
      
      <div id="game-board" class="grid-container"></div>

      <div id="settings" class="settings">
        <button id="icons-btn">Other Art</button>
        <button id="close-btn" class="close-btn">Close</button>
      </div>
      
      <div class="controls">
        <button id="submit-btn">Submit Guess</button>
        <button id="shuffle-btn">Shuffle</button>
        <button id="settings-btn">Settings</button>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
