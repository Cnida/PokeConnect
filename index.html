<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokemon Connections</title>
    <script type="module" src="/src/main.ts"></script>
  </head>
  <body>
    <div id="game">
      <header>
        <h1>Pokemon Connections</h1>
        <p id="victory">Create four groups of four!</p>
      </header>

      <div id="game-board" class="grid-container"></div>

      <dialog id="settings" class="settings">
        <button id="icons-btn">Other Art</button>
        <button id="close-btn" class="close-btn">Close</button>
      </dialog>
      
      <div class="buttons">
        <button id="submit-btn">Submit Guess</button>
        <button id="shuffle-btn">Shuffle</button>
        <button id="settings-btn">Settings</button>
      </div>
    </div>
  </body>
  <footer>
    <div id="footer">
      <p>PokeConnect is a non-profit, fan-made project. All rights, titles, and intellectual property belong to Nintendo, Game Freak, and The Pokémon Company. Please consider buying and supporting the official games!</p>
    </div>
  </footer>
</html>
